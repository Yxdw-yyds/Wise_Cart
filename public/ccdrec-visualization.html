<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>CCDRec 算法图解与实物级动态数据流</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
      :root {
        --bg: #f0f4f8;
        --card: #ffffff;
        --text: #1e293b;
        --muted: #64748b;
        --line: #cbd5e1;
        --primary: #2563eb;
        --primary-light: #eff6ff;

        /* 核心模态配色 (严格对齐论文原图) */
        --color-user: #e11d48; /* 红 */
        --color-item: #2563eb; /* 蓝 */
        --color-image: #16a34a; /* 绿 */
        --color-text: #ea580c; /* 橙 */
        --color-diff: #9333ea; /* 紫 */
        --color-cns: #4d7c0f; /* 深绿 */
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
        background-color: var(--bg);
        color: var(--text);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
        background-size: 20px 20px;
      }

      .gallery-container {
        display: flex;
        width: 96%;
        max-width: 1350px;
        height: 88vh;
        background: var(--card);
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        border: 1px solid #e2e8f0;
      }

      /* 左侧侧边栏 */
      .sidebar {
        width: 280px;
        background: #f8fafc;
        border-right: 1px solid var(--line);
        display: flex;
        flex-direction: column;
        padding: 24px 0;
        z-index: 10;
      }

      .sidebar-header {
        padding: 0 24px 20px;
        border-bottom: 1px solid var(--line);
        margin-bottom: 16px;
      }

      .sidebar-header h2 {
        font-size: 20px;
        color: #0f172a;
        margin-bottom: 6px;
        font-weight: 800;
      }
      .sidebar-header p {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.5;
      }

      .nav-tabs {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 0 16px;
      }

      .tab-btn {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 10px;
        cursor: pointer;
        text-align: left;
        transition: all 0.2s ease;
      }

      .tab-btn:hover {
        background: #f1f5f9;
      }
      .tab-btn.active {
        background: var(--primary-light);
        border-color: #bfdbfe;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
      }

      .tab-icon {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        color: white;
        font-size: 14px;
        flex-shrink: 0;
      }

      .tab-1 .tab-icon {
        background: var(--text);
      }
      .tab-2 .tab-icon {
        background: var(--color-diff);
      }
      .tab-3 .tab-icon {
        background: var(--color-cns);
      }
      .tab-4 .tab-icon {
        background: var(--color-user);
      }

      .tab-text {
        display: flex;
        flex-direction: column;
      }
      .tab-text strong {
        font-size: 15px;
        color: #0f172a;
        margin-bottom: 4px;
        font-weight: 600;
      }
      .tab-text span {
        font-size: 12px;
        color: var(--muted);
      }
      .tab-btn.active .tab-text strong {
        color: var(--primary);
      }

      /* 右侧主视口 */
      .main-view {
        flex-grow: 1;
        position: relative;
        background: #ffffff;
        display: flex;
        padding: 20px;
      }

      .diagram {
        position: absolute;
        top: 20px;
        left: 20px;
        right: 20px;
        bottom: 20px;
        opacity: 0;
        pointer-events: none;
        transform: translateY(15px);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .diagram.active {
        opacity: 1;
        pointer-events: auto;
        transform: translateY(0);
        z-index: 5;
      }

      .diagram-title {
        font-size: 20px;
        font-weight: 800;
        color: #1e293b;
        margin-bottom: 20px;
        text-align: center;
      }

      /* SVG 样式 */
      svg {
        width: 100%;
        height: 100%;
        max-height: 650px;
      }

      .path-line {
        fill: none;
        stroke: var(--line);
        stroke-width: 2.5;
        stroke-dasharray: 4 4;
        marker-end: url(#arrowhead);
      }
      .path-solid {
        fill: none;
        stroke: var(--line);
        stroke-width: 2;
        marker-end: url(#arrowhead);
      }

      .txt-title {
        font-size: 14px;
        font-weight: 600;
        fill: #1e293b;
        text-anchor: middle;
        font-family: sans-serif;
      }
      .txt-sub {
        font-size: 12px;
        fill: #64748b;
        text-anchor: middle;
        font-family: sans-serif;
      }
      .txt-math {
        font-size: 14px;
        fill: #475569;
        font-style: italic;
        font-family: "Cambria Math", serif;
        text-anchor: middle;
      }

      .bg-area {
        fill-opacity: 0.04;
        stroke-dasharray: 6 4;
        stroke-width: 2;
        rx: 16;
      }
      .bg-area.blue {
        fill: var(--color-item);
        stroke: var(--color-item);
      }
      .bg-area.purple {
        fill: var(--color-diff);
        stroke: var(--color-diff);
      }
      .bg-area.green {
        fill: var(--color-cns);
        stroke: var(--color-cns);
      }

      .physical-box {
        fill: #fff;
        stroke: #cbd5e1;
        stroke-width: 1.5;
        rx: 8;
        filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.05));
      }
      .dashed-box {
        fill: transparent;
        stroke: #94a3b8;
        stroke-width: 1.5;
        stroke-dasharray: 5 3;
        rx: 8;
      }

      .particle {
        filter: drop-shadow(0 0 4px currentColor);
      }
    </style>
  </head>

    <script>
      const C = {
        U: "#e11d48",
        I: "#2563eb",
        V: "#16a34a",
        T: "#ea580c",
        D: "#9333ea",
        C: "#4d7c0f",
        N: "#94a3b8",
      };
      let activeTimelines = [];

      document.addEventListener("DOMContentLoaded", () => {
        startAnimation(1);
      });

      function switchTab(index) {
        document
          .querySelectorAll(".tab-btn")
          .forEach((btn) => btn.classList.remove("active"));
        document.querySelector(`.tab-${index}`).classList.add("active");

        document
          .querySelectorAll(".diagram")
          .forEach((d) => d.classList.remove("active"));
        document.getElementById(`view-${index}`).classList.add("active");

        stopAllAnimations();
        startAnimation(index);
      }

      function stopAllAnimations() {
        activeTimelines.forEach((tl) => tl.pause());
        activeTimelines = [];
        document.querySelectorAll(".particle").forEach((p) => p.remove());
      }

      function createParticle(layer, color, r = 5) {
        const pt = document.createElementNS(
          "http://www.w3.org/2000/svg",
          "circle"
        );
        pt.setAttribute("r", r);
        pt.setAttribute("fill", color);
        pt.classList.add("particle");
        pt.style.color = color;
        layer.appendChild(pt);
        return pt;
      }

      function shoot(svgIdx, pathId, color, delay = 0, duration = 1500) {
        const svg = document.querySelector(`#view-${svgIdx} svg`);
        const pathEl = document.getElementById(pathId);
        const layer = svg.querySelector(".particle-layer");
        if (!pathEl || !layer) return;

        const path = anime.path(pathEl);
        const pt = createParticle(layer, color);

        const tl = anime({
          targets: pt,
          translateX: path("x"),
          translateY: path("y"),
          easing: "linear",
          duration: duration,
          delay: delay,
          opacity: [0, 1, 1, 0],
          loop: true,
        });
        activeTimelines.push(tl);
      }

      function startAnimation(index) {
        if (index === 1) {
          const flows = [
            { id: "v1-ug", c: C.U },
            { id: "v1-ig", c: C.I },
            { id: "v1-id", c: C.I },
            { id: "v1-vd", c: C.V },
            { id: "v1-td", c: C.T },
            { id: "v1-gl", c: C.I },
            { id: "v1-dl", c: C.D },
            { id: "v1-dc", c: C.D },
            { id: "v1-cl", c: C.C },
          ];
          flows.forEach((f) => {
            for (let i = 0; i < 2; i++) shoot(1, f.id, f.c, i * 1200, 2400);
          });
        } else if (index === 2) {
          ["v2-cv", "v2-ct", "v2-cs"].forEach((id) => {
            let color = id === "v2-cv" ? C.V : id === "v2-ct" ? C.T : C.N;
            for (let i = 0; i < 2; i++) shoot(2, id, color, i * 1000, 2000);
          });
          for (let i = 0; i < 2; i++)
            shoot(2, "v2-out", C.D, i * 1000 + 1000, 2000);
        } else if (index === 3) {
          ["v3-d1", "v3-d2", "v3-d3"].forEach((id, idx) => {
            for (let i = 0; i < 2; i++)
              shoot(3, id, C.C, idx * 1200 + i * 800, 1500);
          });
        } else if (index === 4) {
          const flows = [
            { id: "v4-p1", c: C.U },
            { id: "v4-p2", c: C.D },
            { id: "v4-p3", c: C.N },
            { id: "v4-p4", c: C.C },
            { id: "v4-o1", c: C.U },
            { id: "v4-o2", c: C.D },
          ];
          flows.forEach((f) => {
            for (let i = 0; i < 2; i++) shoot(4, f.id, f.c, i * 1200, 2400);
          });
        }
      }
    </script>
